{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Abdulazizov | Portfolio{% endblock %}</title>
  <meta name="description" content="Abdulazizov - Web Developer Portfolio va Blog" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <footer class="footer">
    <p>© <span id="year"></span> Abdulazizov. <span data-i18n="footerText">Barcha huquqlar himoyalangan.</span></p>
  </footer>

  {% block scripts %}{% endblock %}
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
